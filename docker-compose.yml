services:
  db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_DATABASE: damage_manager_db
      MYSQL_ROOT_PASSWORD: sorina
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: ./vehicle-damage-manager
    container_name: spring-backend
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/damage_manager_db?allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=sorina
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update

  frontend:
    build: ./vehicle-damage-manager-ui
    container_name: react-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend